<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Mind: Ultimate Rev5</title>
    <style>
        :root {
            --bg-color: #050010;
            --primary-color: #ffd700; 
            --accent-color: #b026ff; 
            --error-color: #ff3860;
            --success-color: #00ff9d;
            --glass: rgba(255, 255, 255, 0.05);
            --key-color: rgba(255,255,255,0.08);
            --active-diff-color: #00ccff;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
                repeating-linear-gradient(0deg, transparent 0, transparent 1px, #b026ff15 1px, #b026ff15 2px),
                radial-gradient(circle at center, #1a0b2e 0%, #000 100%);
            background-size: 100% 100%, 100% 4px, 100% 100%;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Roboto', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* UI Containers */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
            position: relative;
            z-index: 10;
            height: 100vh; 
            justify-content: flex-start;
            overflow-y: auto;
        }

        .active { display: flex; }

        h1 { 
            color: var(--primary-color); 
            font-size: 2.2rem;
            margin: 20px 0 5px 0;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            font-style: italic;
            letter-spacing: -2px;
        }
        
        .subtitle {
            color: var(--accent-color);
            letter-spacing: 6px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Knowledge Box */
        .knowledge-box {
            background: rgba(0, 204, 255, 0.1);
            border-left: 4px solid var(--active-diff-color);
            padding: 10px 15px;
            margin-bottom: 15px;
            text-align: left;
            font-size: 0.8rem;
            line-height: 1.4;
            border-radius: 0 8px 8px 0;
            color: #ccc;
        }
        .knowledge-box strong { color: var(--active-diff-color); }

        /* Sections */
        .section-box {
            width: 100%;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            box-sizing: border-box;
        }
        
        .sec-label { font-size: 0.9rem; color: #888; margin-bottom: 10px; text-align: left; letter-spacing: 1px; font-weight: bold;}
        
        /* Grid Layouts */
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

        .btn-small {
            background: transparent;
            border: 1px solid #555;
            color: #888;
            padding: 8px 2px;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .diff-btn.selected {
            background: var(--active-diff-color);
            border-color: var(--active-diff-color);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.4);
        }

        /* Mode Selection Buttons */
        button.start-btn { 
            width: 100%; 
            padding: 10px; 
            font-size: 1rem; 
            background: linear-gradient(90deg, #333, #444);
            border: 1px solid #555;
            color: #fff; 
            font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button.start-btn:active { transform: scale(0.97); }
        
        button.color-btn {
            background: linear-gradient(90deg, #1c5e71, #1898c4);
            border-color: #00ccff;
            color: #fff;
        }

        button.plate-btn {
            background: linear-gradient(90deg, #4b1c71, #8418c4);
            border-color: var(--accent-color);
        }

        button.mobile-btn {
            background: linear-gradient(90deg, #005544, #00a877);
            border-color: var(--success-color);
            grid-column: span 2;
        }
        
        button.brawl-btn {
            background: linear-gradient(135deg, #ff3860, #b026ff);
            border: none;
        }

        /* Game Display */
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin: 15px 0; font-size: 1rem; color: #aaa;
            border-bottom: 1px solid #333; padding-bottom: 5px;
        }

        .display-area {
            height: 100px; width: 100%; display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; position: relative; background: rgba(0,0,0,0.3);
            border-radius: 10px; border: 1px solid #333; overflow: hidden;
        }

        .big-text {
            font-size: 3rem; font-weight: 900; font-family: 'Courier New', monospace;
            letter-spacing: 2px; position: absolute; width: 100%; text-align: center;
        }
        .countdown { color: var(--accent-color); animation: pulse 0.5s infinite alternate; font-size: 4rem;}
        .target-number { color: #fff; text-shadow: 0 0 30px #fff; display: none; z-index: 5;}
        
        .reveal-answer { color: var(--success-color); text-shadow: 0 0 20px var(--success-color); display: none; flex-direction: column; align-items: center; animation: fadeIn 0.2s;}
        .reveal-label { font-size: 0.8rem; color: #888; letter-spacing: 2px; margin-bottom: 5px; text-shadow: none;}
        #reveal-text { font-size: 2.5rem; display: flex; justify-content: center; align-items: center;}

        /* Color Blocks */
        .color-block {
            display: inline-block;
            width: 32px;
            height: 32px;
            margin: 0 3px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.4);
            vertical-align: middle;
        }

        @media (max-width: 400px) {
            .color-block { width: 24px; height: 24px; margin: 0 2px; border-radius: 4px;}
        }

        /* Input Slots */
        .input-slots {
            display: flex; gap: 4px; margin-bottom: 15px; justify-content: center;
            height: 55px; align-items: center; width: 100%; flex-wrap: wrap;
        }

        .slot {
            width: 38px; height: 55px; background: var(--glass); border: 1px solid #444;
            border-radius: 4px; font-size: 1.8rem; display: flex; align-items: center; justify-content: center;
            transition: all 0.1s; font-weight: bold; font-family: monospace;
        }

        .input-slots.compact .slot { width: 26px; height: 45px; font-size: 1.3rem; gap: 2px;}
        .input-slots.compact .separator { font-size: 1.5rem; margin: 0; }

        .slot.active { border-color: var(--primary-color); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); transform: translateY(-2px); }
        .slot.correct { background: rgba(0, 255, 157, 0.1); border-color: var(--success-color); color: var(--success-color); }
        .slot.wrong { background: rgba(255, 56, 96, 0.1); border-color: var(--error-color); color: var(--error-color); }
        .slot[data-type="letter"] { border-color: #666; color: var(--primary-color); }

        .separator { font-size: 2rem; color: #666; font-weight: bold; margin: 0 1px; padding-bottom: 5px;}

        /* Keypad Container */
        .keypad { display: grid; gap: 5px; width: 100%; transition: all 0.2s; margin-bottom: 20px;}
        .keypad.disabled { opacity: 0.4; pointer-events: none; filter: grayscale(0.5); }
        .keypad.num-mode { grid-template-columns: repeat(3, 1fr); }
        .keypad.alpha-mode { grid-template-columns: repeat(6, 1fr); }

        .keypad button { background: var(--key-color); border: 1px solid #333; color: white; padding: 12px; font-size: 1.3rem; border-radius: 4px; cursor: pointer; transition: all 0.1s;}
        .keypad.alpha-mode button { padding: 8px 2px; font-size: 1.1rem; }
        .keypad button:active { transform: scale(0.95); background: #333; }
        .keypad button.delete-btn { color: var(--error-color); border-color: #522; font-weight: bold; }
        .keypad.alpha-mode .delete-btn { grid-column: span 2; }

        .color-key {
            font-weight: 900 !important;
            font-size: 1.2rem !important;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            border: 2px solid rgba(255,255,255,0.2) !important;
        }

        /* Top Controls */
        .top-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; z-index: 100;}
        .control-btn { background: none; border: 1px solid #444; padding: 8px 12px; font-size: 0.8rem; color: #666; border-radius: 20px; cursor: pointer;}
        .home-btn { background: transparent; border: 1px solid #444; color: #888; padding: 5px 10px; font-size: 1.2rem; border-radius: 4px; cursor: pointer; margin-right: 10px;}

        @keyframes pulse { 0% { opacity: 0.7; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1.05); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .result-title { font-size: 2.5rem; margin: 10px 0; font-weight: bold; }
        #comment { color: #888; font-style: italic; margin-bottom: 20px; min-height: 1.5em; max-width: 80%; line-height: 1.5; }
        .small-desc { display: block; font-size: 0.7rem; font-weight: normal; opacity: 0.8; margin-top: 2px;}

    </style>
</head>
<body>

    <div class="top-controls">
        <button class="control-btn" onclick="toggleMute()" id="mute-btn">MUSIC: ON</button>
    </div>

    <div id="start-screen" class="screen active">
        <h1>FLASH MIND</h1>
        <div class="subtitle">COGNITIVE LAB</div>

        <div class="knowledge-box">
            <strong>💡 腦科學小知識 (視覺-語義轉換)：</strong><br>
            在大腦運作中，看到「顏色」並在鍵盤上找到對應的「顏色文字」需要跨越視覺皮層與語言中樞。試著挑戰你的瞬時記憶與色彩映射能力吧！
        </div>
        
        <div class="section-box">
            <div class="sec-label">STEP 1: 閃存時間 (難度)</div>
            <div class="grid-4">
                <button class="btn-small diff-btn" onclick="setDifficulty('easy', this)">簡單 1.0s</button>
                <button class="btn-small diff-btn selected" onclick="setDifficulty('normal', this)">一般 0.5s</button>
                <button class="btn-small diff-btn" onclick="setDifficulty('hard', this)">困難 0.3s</button>
                <button class="btn-small diff-btn" onclick="setDifficulty('hell', this)" style="color:#ff3860; border-color:#522;">地獄 0.12s</button>
            </div>
        </div>

        <div class="section-box" style="padding-bottom: 5px;">
            <div class="sec-label">STEP 2: 記憶挑戰模式</div>
            
            <div class="sec-label" style="font-size: 0.75rem; color:#666; margin-bottom: 5px;">▶ 視覺記憶：色彩方塊 (7±2) <span style="color:#00ccff">NEW!</span></div>
            <div class="grid-6" style="margin-bottom: 10px;">
                <button class="btn-small start-btn color-btn" onclick="game.init('color_5')">5色</button>
                <button class="btn-small start-btn color-btn" onclick="game.init('color_6')">6色</button>
                <button class="btn-small start-btn color-btn" onclick="game.init('color_7')">7色</button>
                <button class="btn-small start-btn color-btn" onclick="game.init('color_8')">8色</button>
                <button class="btn-small start-btn color-btn" onclick="game.init('color_9')">9色</button>
                <button class="btn-small start-btn color-btn" style="border-color:#fff;" onclick="game.init('color_mixed')">混雜</button>
            </div>

            <div class="sec-label" style="font-size: 0.75rem; color:#666; margin-bottom: 5px;">▶ 基礎理論：純數字 (7±2)</div>
            <div class="grid-6" style="margin-bottom: 10px;">
                <button class="btn-small start-btn" onclick="game.init('std_5')">5碼</button>
                <button class="btn-small start-btn" onclick="game.init('std_6')">6碼</button>
                <button class="btn-small start-btn" onclick="game.init('std_7')">7碼</button>
                <button class="btn-small start-btn" onclick="game.init('std_8')">8碼</button>
                <button class="btn-small start-btn" onclick="game.init('std_9')">9碼</button>
                <button class="btn-small start-btn" style="border-color:var(--primary-color); color:var(--primary-color);" onclick="game.init('std_mixed')">混雜</button>
            </div>

            <div class="sec-label" style="font-size: 0.75rem; color:#666; margin-bottom: 5px;">▶ 實務應用：組塊記憶 (車牌 & 手機)</div>
            <div class="grid-2" style="margin-bottom: 5px;">
                <button class="start-btn plate-btn" onclick="game.init('old_car')">舊款汽車 <span class="small-desc">2英-4數</span></button>
                <button class="start-btn plate-btn" onclick="game.init('new_car')">新款汽車 <span class="small-desc">3英-4數</span></button>
                <button class="start-btn plate-btn" onclick="game.init('motorcycle')">一般機車 <span class="small-desc">3英-3數</span></button>
                <button class="start-btn brawl-btn" onclick="game.init('plate_mixed')">車牌大亂鬥 <span class="small-desc">隨機車牌切換</span></button>
                <button class="start-btn mobile-btn" onclick="game.init('mobile')">手機號碼 <span class="small-desc">09XX - XXX - XXX</span></button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="status-bar">
            <div style="display:flex; align-items:center;">
                <button class="home-btn" onclick="game.home()" title="返回主畫面">🏠</button>
                <span id="mode-display" style="font-size: 0.9rem; font-weight: bold;">MODE</span>
            </div>
            <div style="text-align:right;">
                <div id="round-display" style="font-size:0.9rem; color:#666;">Round 1/10</div>
                <div id="score-display" style="color:var(--primary-color);">Score: 0</div>
            </div>
        </div>

        <div class="display-area">
            <div id="countdown" class="big-text countdown"></div>
            <div id="target-number" class="big-text target-number"></div>
            <div id="reveal-answer" class="big-text reveal-answer">
                <div class="reveal-label">CORRECT ANSWER</div>
                <div id="reveal-text"></div>
            </div>
        </div>

        <div class="input-slots" id="input-slots"></div>
        <div class="keypad disabled" id="keypad"></div>
    </div>

    <div id="result-screen" class="screen">
        <div style="color: #666; font-size: 0.9rem; letter-spacing: 3px;">SESSION COMPLETED</div>
        <div class="result-title" id="rank-title"></div>
        <div class="final-score" id="final-score-text" style="font-size: 1.5rem; color: #fff; margin-bottom: 10px;"></div>
        <div style="font-size: 0.9rem; color: #aaa; margin-bottom: 5px;">難度: <span id="final-diff"></span> | 模式: <span id="final-mode"></span></div>
        <div id="comment"></div>
        <button class="start-btn brawl-btn" style="margin-top: 10px;" onclick="game.home()">返回主選單</button>
    </div>

    <script>
        // --- Difficulty & Audio System ---
        let currentDifficulty = 'normal';
        const difficulties = {
            'easy': { time: 1000, label: '簡單' },
            'normal': { time: 500, label: '一般' },
            'hard': { time: 300, label: '困難' },
            'hell': { time: 120, label: '地獄' }
        };

        function setDifficulty(level, btn) {
            currentDifficulty = level;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isMuted = false;

        const bgm = {
            isPlaying: false, tempo: 135, nextNoteTime: 0, timerID: null, beatCount: 0,
            start: function() {
                if (this.isPlaying) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                this.isPlaying = true; this.beatCount = 0;
                this.nextNoteTime = audioCtx.currentTime;
                this.scheduler();
            },
            stop: function() { this.isPlaying = false; clearTimeout(this.timerID); },
            scheduler: function() {
                while (this.nextNoteTime < audioCtx.currentTime + 0.1) {
                    this.playBeat(this.nextNoteTime, this.beatCount);
                    this.advanceNote();
                }
                if (this.isPlaying) this.timerID = setTimeout(() => this.scheduler(), 25);
            },
            advanceNote: function() {
                const secondsPerBeat = 60.0 / this.tempo;
                this.nextNoteTime += 0.25 * secondsPerBeat;
                this.beatCount++;
                if (this.beatCount === 16) this.beatCount = 0;
            },
            playBeat: function(time, step) {
                if (isMuted) return;
                if (step % 2 === 0) {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    const freq = (step === 0 || step === 8) ? 55 : (step === 4 ? 65.41 : 49); 
                    osc.frequency.setValueAtTime(freq, time); osc.type = 'sawtooth';
                    gain.gain.setValueAtTime(0.15, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
                    osc.start(time); osc.stop(time + 0.15);
                }
                if (step % 4 === 0) {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.frequency.setValueAtTime(150, time); osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.5);
                    gain.gain.setValueAtTime(0.4, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.5);
                    osc.start(time); osc.stop(time + 0.5);
                }
            }
        };

        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('mute-btn');
            btn.innerText = isMuted ? "MUSIC: OFF" : "MUSIC: ON";
            btn.style.color = isMuted ? "#666" : "#fff";
        }

        const playSFX = (type) => {
            if (isMuted) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'tick') {
                osc.frequency.setValueAtTime(800, now); osc.type = 'square';
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'flash') {
                osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(2000, now + 0.1);
                osc.type = 'triangle'; gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'input') {
                osc.frequency.setValueAtTime(1200, now); osc.type = 'sine';
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'correct') {
                osc.frequency.setValueAtTime(600, now); osc.frequency.setValueAtTime(1200, now + 0.1);
                osc.type = 'sine'; gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'wrong') {
                osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(50, now + 0.5);
                osc.type = 'sawtooth'; gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        };

        // --- Game Logic ---
        const game = {
            totalRounds: 10, currentRound: 0, score: 0,
            target: "", userInput: "", state: "idle",
            mode: '', currentFormat: '', 
            digitCount: 6, letterCount: 0,
            flashDuration: 500, countdownInterval: null,

            // Color Map for Color Mode
            colorMap: {
                '1': { name: '紅', bg: '#ff3b30', text: '#fff' },
                '2': { name: '橘', bg: '#ff9500', text: '#fff' },
                '3': { name: '黃', bg: '#ffcc00', text: '#000' },
                '4': { name: '綠', bg: '#34c759', text: '#000' },
                '5': { name: '藍', bg: '#007aff', text: '#fff' },
                '6': { name: '紫', bg: '#af52de', text: '#fff' },
                '7': { name: '粉', bg: '#ff2d55', text: '#fff' },
                '8': { name: '棕', bg: '#a2845e', text: '#fff' },
                '9': { name: '白', bg: '#ffffff', text: '#000' }
            },

            modeNames: {
                'color_5': '色彩(5色)', 'color_6': '色彩(6色)', 'color_7': '色彩(7色)', 
                'color_8': '色彩(8色)', 'color_9': '色彩(9色)', 'color_mixed': '色彩(混雜)',
                'std_5': '純數字(5碼)', 'std_6': '純數字(6碼)', 'std_7': '純數字(7碼)', 
                'std_8': '純數字(8碼)', 'std_9': '純數字(9碼)', 'std_mixed': '純數字(混雜)',
                'old_car': '舊汽車', 'new_car': '新汽車', 'motorcycle': '機車', 
                'plate_mixed': '車牌大亂鬥', 'mobile': '手機號碼'
            },

            init: function(selectedMode) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                bgm.start();

                this.mode = selectedMode;
                this.flashDuration = difficulties[currentDifficulty].time;

                document.getElementById('start-screen').classList.remove('active');
                document.getElementById('result-screen').classList.remove('active');
                document.getElementById('game-screen').classList.add('active');
                
                document.getElementById('mode-display').innerText = `${this.modeNames[this.mode]} | ${difficulties[currentDifficulty].label}`;

                this.currentRound = 0;
                this.score = 0;
                this.startRound();
            },

            home: function() {
                clearInterval(this.countdownInterval);
                bgm.stop();
                this.state = "idle";
                this.userInput = "";
                document.getElementById('game-screen').classList.remove('active');
                document.getElementById('result-screen').classList.remove('active');
                document.getElementById('start-screen').classList.add('active');
            },

            startRound: function() {
                if (this.currentRound >= this.totalRounds) {
                    this.endGame(); return;
                }
                
                this.currentRound++;
                this.determineFormat();
                this.generateTarget();
                this.initSlotsHTML(); 
                
                this.userInput = "";
                this.state = "counting";
                
                this.updateUI();
                this.resetDisplayArea();
                
                this.renderKeypad(); 
                document.getElementById('keypad').classList.add('disabled');
                
                this.runCountdown(3); 
            },

            determineFormat: function() {
                if (this.mode.startsWith('std_')) {
                    if (this.mode === 'std_mixed') {
                        this.digitCount = Math.floor(Math.random() * 5) + 5; 
                    } else {
                        this.digitCount = parseInt(this.mode.split('_')[1]);
                    }
                    this.letterCount = 0;
                    this.currentFormat = 'standard';
                } else if (this.mode.startsWith('color_')) {
                    if (this.mode === 'color_mixed') {
                        this.digitCount = Math.floor(Math.random() * 5) + 5; 
                    } else {
                        this.digitCount = parseInt(this.mode.split('_')[1]);
                    }
                    this.letterCount = 0;
                    this.currentFormat = 'color';
                } else if (this.mode === 'plate_mixed') {
                    const plateModes = ['old_car', 'new_car', 'motorcycle'];
                    this.currentFormat = plateModes[Math.floor(Math.random() * plateModes.length)];
                } else {
                    this.currentFormat = this.mode;
                }

                if (this.currentFormat === 'old_car') { this.digitCount = 6; this.letterCount = 2; }
                else if (this.currentFormat === 'motorcycle') { this.digitCount = 6; this.letterCount = 3; }
                else if (this.currentFormat === 'new_car') { this.digitCount = 7; this.letterCount = 3; }
                else if (this.currentFormat === 'mobile') { this.digitCount = 10; this.letterCount = 0; }
            },

            generateTarget: function() {
                const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                let t = "";
                if (this.currentFormat === 'standard') {
                    for(let i=0; i<this.digitCount; i++) t += Math.floor(Math.random() * 10);
                } else if (this.currentFormat === 'color') {
                    // Generate string of 1-9 indicating colors
                    for(let i=0; i<this.digitCount; i++) t += (Math.floor(Math.random() * 9) + 1).toString();
                } else if (this.currentFormat === 'mobile') {
                    t = "09"; 
                    for(let i=0; i<8; i++) t += Math.floor(Math.random() * 10);
                } else {
                    for(let i=0; i<this.letterCount; i++) t += chars.charAt(Math.floor(Math.random() * 26));
                    const numCount = this.digitCount - this.letterCount;
                    for(let i=0; i<numCount; i++) t += Math.floor(Math.random() * 10);
                }
                this.target = t;
            },

            formatDisplayString: function(str) {
                if (this.currentFormat === 'standard') return str;
                if (this.currentFormat === 'mobile') {
                    return str.slice(0, 4) + '-' + str.slice(4, 7) + '-' + str.slice(7);
                }
                return str.slice(0, this.letterCount) + '-' + str.slice(this.letterCount);
            },

            initSlotsHTML: function() {
                const container = document.getElementById('input-slots');
                container.innerHTML = '';
                
                if (this.digitCount >= 8) container.classList.add('compact');
                else container.classList.remove('compact');

                for(let i=0; i < this.digitCount; i++) {
                    if (this.currentFormat === 'mobile') {
                        if (i === 4 || i === 7) {
                            const sep = document.createElement('div');
                            sep.className = 'separator'; sep.innerText = '-';
                            container.appendChild(sep);
                        }
                    } else if (this.currentFormat !== 'standard' && this.currentFormat !== 'color' && i === this.letterCount) {
                        const sep = document.createElement('div');
                        sep.className = 'separator'; sep.innerText = '-';
                        container.appendChild(sep);
                    }

                    const div = document.createElement('div');
                    div.className = 'slot';
                    div.style.background = ''; // reset inline background
                    if(i < this.letterCount && this.currentFormat !== 'color') div.setAttribute('data-type', 'letter');
                    container.appendChild(div);
                }
            },

            updateUI: function() {
                document.getElementById('round-display').innerText = `Round ${this.currentRound}/${this.totalRounds}`;
                document.getElementById('score-display').innerText = `Score: ${this.score}`;
            },

            resetDisplayArea: function() {
                document.getElementById('countdown').style.display = 'none';
                document.getElementById('target-number').style.display = 'none';
                document.getElementById('reveal-answer').style.display = 'none';
                document.getElementById('target-number').innerHTML = ''; // Clear for color mode
                document.getElementById('reveal-text').innerHTML = '';
                document.getElementById('target-number').style.fontSize = this.digitCount > 7 ? '2.5rem' : '3.5rem';
                document.getElementById('reveal-text').style.fontSize = this.digitCount > 7 ? '2rem' : '2.5rem';
            },

            runCountdown: function(seconds) {
                const cdEl = document.getElementById('countdown');
                cdEl.style.display = 'block';
                let count = seconds;
                cdEl.innerText = count;
                playSFX('tick');

                clearInterval(this.countdownInterval);
                this.countdownInterval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        cdEl.innerText = count;
                        playSFX('tick');
                    } else {
                        clearInterval(this.countdownInterval);
                        this.flashNumber();
                    }
                }, 1000);
            },

            flashNumber: function() {
                const cdEl = document.getElementById('countdown');
                const targetEl = document.getElementById('target-number');
                
                cdEl.style.display = 'none';
                targetEl.style.display = 'block';

                if (this.currentFormat === 'color') {
                    targetEl.innerHTML = '';
                    for(let i=0; i<this.target.length; i++) {
                        const cb = document.createElement('div');
                        cb.className = 'color-block';
                        cb.style.background = this.colorMap[this.target[i]].bg;
                        targetEl.appendChild(cb);
                    }
                } else {
                    targetEl.innerText = this.formatDisplayString(this.target);
                }
                
                playSFX('flash');

                setTimeout(() => {
                    targetEl.style.display = 'none';
                    this.enableInput();
                }, this.flashDuration); 
            },

            enableInput: function() {
                this.state = "input";
                document.getElementById('keypad').classList.remove('disabled');
                this.renderKeypad(); 
                this.highlightCurrentSlot();
            },

            renderKeypad: function() {
                const keypadEl = document.getElementById('keypad');
                keypadEl.innerHTML = '';
                
                if (this.currentFormat === 'color') {
                    keypadEl.className = this.state === 'counting' ? 'keypad num-mode disabled' : 'keypad num-mode';
                    for (let i = 1; i <= 9; i++) {
                        const btn = document.createElement('button');
                        const c = this.colorMap[i.toString()];
                        btn.innerText = c.name;
                        btn.className = 'color-key';
                        btn.style.background = c.bg;
                        btn.style.color = c.text;
                        btn.onclick = () => this.input(i.toString());
                        keypadEl.appendChild(btn);
                    }
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.style.gridColumn = 'span 3';
                    delBtn.innerText = '⌫ 刪除';
                    delBtn.onclick = () => this.delete();
                    keypadEl.appendChild(delBtn);
                    return;
                }

                let showLetters = (this.userInput.length < this.letterCount);

                if (showLetters) {
                    keypadEl.className = this.state === 'counting' ? 'keypad alpha-mode disabled' : 'keypad alpha-mode';
                    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                    for (let i = 0; i < chars.length; i++) {
                        const btn = document.createElement('button');
                        btn.innerText = chars[i];
                        btn.onclick = () => this.input(chars[i]);
                        keypadEl.appendChild(btn);
                    }
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.innerText = '⌫';
                    delBtn.onclick = () => this.delete();
                    keypadEl.appendChild(delBtn);
                } else {
                    keypadEl.className = this.state === 'counting' ? 'keypad num-mode disabled' : 'keypad num-mode';
                    for (let i = 1; i <= 9; i++) {
                        const btn = document.createElement('button');
                        btn.innerText = i;
                        btn.onclick = () => this.input(i.toString());
                        keypadEl.appendChild(btn);
                    }
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.innerText = '⌫';
                    delBtn.onclick = () => this.delete();
                    keypadEl.appendChild(delBtn);

                    const zeroBtn = document.createElement('button');
                    zeroBtn.innerText = '0';
                    zeroBtn.onclick = () => this.input('0');
                    keypadEl.appendChild(zeroBtn);
                    
                    const emptyBtn = document.createElement('button');
                    emptyBtn.style.visibility = 'hidden';
                    keypadEl.appendChild(emptyBtn);
                }
            },

            input: function(char) {
                if (this.state !== "input" || this.userInput.length >= this.digitCount) return;
                
                playSFX('input');
                this.userInput += char;
                this.updateSlots();
                this.renderKeypad(); 
                
                if (this.userInput.length === this.digitCount) {
                    setTimeout(() => this.checkAnswer(), 150);
                }
            },

            delete: function() {
                if (this.state !== "input" || this.userInput.length === 0) return;
                this.userInput = this.userInput.slice(0, -1);
                playSFX('input');
                this.updateSlots();
                this.renderKeypad(); 
            },

            updateSlots: function() {
                const slots = document.querySelectorAll('.slot');
                slots.forEach((slot, index) => {
                    const val = this.userInput[index];
                    if (this.currentFormat === 'color') {
                        if (val) {
                            slot.style.background = this.colorMap[val].bg;
                            slot.innerText = "";
                        } else {
                            slot.style.background = 'var(--glass)';
                            slot.innerText = "";
                        }
                    } else {
                        slot.innerText = val || "";
                    }
                    slot.classList.remove('active');
                });
                this.highlightCurrentSlot();
            },

            highlightCurrentSlot: function() {
                if (this.userInput.length < this.digitCount) {
                    document.querySelectorAll('.slot')[this.userInput.length].classList.add('active');
                }
            },

            checkAnswer: function() {
                this.state = "checking";
                const slots = document.querySelectorAll('.slot');
                let roundScore = 0;

                document.getElementById('keypad').classList.add('disabled');

                for (let i = 0; i < this.digitCount; i++) {
                    if (this.userInput[i] === this.target[i]) {
                        slots[i].classList.add('correct');
                        if (this.currentFormat === 'color') {
                            slots[i].style.border = '2px solid var(--success-color)';
                        }
                        roundScore++;
                    } else {
                        slots[i].classList.add('wrong');
                        if (this.currentFormat === 'color') {
                            slots[i].style.border = '2px solid var(--error-color)';
                        }
                    }
                }

                if (roundScore === this.digitCount) {
                    playSFX('correct');
                    this.score += 10;
                    setTimeout(() => { this.startRound(); }, 1000);
                } else {
                    playSFX('wrong');
                    this.showCorrectAnswer();
                }
            },

            showCorrectAnswer: function() {
                const revealEl = document.getElementById('reveal-answer');
                const revealText = document.getElementById('reveal-text');
                
                document.getElementById('countdown').style.display = 'none';
                revealEl.style.display = 'flex';

                if (this.currentFormat === 'color') {
                    revealText.innerHTML = '';
                    for(let i=0; i<this.target.length; i++) {
                        const cb = document.createElement('div');
                        cb.className = 'color-block';
                        cb.style.background = this.colorMap[this.target[i]].bg;
                        revealText.appendChild(cb);
                    }
                } else {
                    revealText.innerText = this.formatDisplayString(this.target);
                }

                setTimeout(() => { this.startRound(); }, 2000);
            },

            endGame: function() {
                bgm.stop();
                document.getElementById('game-screen').classList.remove('active');
                document.getElementById('result-screen').classList.add('active');
                
                document.getElementById('final-diff').innerText = difficulties[currentDifficulty].label;
                document.getElementById('final-mode').innerText = this.modeNames[this.mode];

                const finalScore = this.score;
                let title = "", color = "", comment = "";

                if (finalScore === 100) { 
                    title = "LEGEND (傳說)"; color = "#ffd700"; 
                    comment = "完美無缺。你的大腦已突破視覺與語義轉換的極限。";
                }
                else if (finalScore >= 80) { 
                    title = "ELITE (菁英)"; color = "#00ff9d"; 
                    comment = "驚人的認知處理速度，色彩對映完全難不倒你。";
                }
                else if (finalScore >= 50) { 
                    title = "PASS (合格)"; color = "#00ccff"; 
                    comment = "表現不錯，大腦已經開始適應跨頻道的資訊整合。";
                }
                else { 
                    title = "FAIL (失敗)"; color = "#ff3860"; 
                    comment = "大腦發生了短期資訊打結，建議先挑戰少一點的色塊！";
                }

                document.getElementById('final-score-text').innerText = `SCORE: ${finalScore}`;
                const rankEl = document.getElementById('rank-title');
                rankEl.innerText = title; rankEl.style.color = color;
                document.getElementById('comment').innerText = comment;
                
                if(finalScore >= 50) playSFX('correct'); else playSFX('wrong');
            }
        };
    </script>
</body>
</html>
